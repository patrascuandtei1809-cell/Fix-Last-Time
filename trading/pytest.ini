[pytest]
# Run the whole trading test suite with a single command:
#     cd trading && python -m pytest
# Discovers both the top-level test files (test_research.py,
# test_bot_validation_gate.py) and everything under tests/.
addopts = -q
norecursedirs = data __pycache__ exchanges .streamlit tests/__pycache__
filterwarnings =
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:binance.*
